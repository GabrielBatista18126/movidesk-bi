version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: movidesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-movidesk_bi}
      POSTGRES_USER:     ${DB_USER:-movidesk_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senha_segura_aqui}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d   # roda os SQLs na ordem ao subir
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-movidesk_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
